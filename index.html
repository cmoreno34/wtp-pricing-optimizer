<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTP Price Optimizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root{--bg:#0f172a;--s1:#1e293b;--s2:#334155;--bd:#475569;--tx:#e2e8f0;--mu:#94a3b8;--ac:#3b82f6;--ac2:#8b5cf6;--gn:#10b981;--rd:#ef4444;--or:#f59e0b;--pk:#ec4899}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
        header{background:linear-gradient(135deg,#1e3a5f,#0f172a);border-bottom:1px solid var(--bd);padding:1.2rem 2rem}
        header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(90deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:var(--mu);font-size:.82rem}
        .container{max-width:1440px;margin:0 auto;padding:1.2rem}
        .top-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
        .top-bar button{width:auto}

        .panel{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:1rem;margin-bottom:.75rem}
        .panel h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ac);margin-bottom:.6rem}
        .panel h3{font-size:.8rem;color:var(--mu);margin:.6rem 0 .4rem;border-top:1px solid var(--s2);padding-top:.5rem}

        label{display:block;font-size:.74rem;color:var(--mu);margin-bottom:.15rem;font-weight:500}
        input,select{width:100%;background:var(--bg);border:1px solid var(--bd);color:var(--tx);border-radius:6px;padding:.4rem .55rem;font-size:.82rem;margin-bottom:.5rem}
        input:focus,select:focus{outline:none;border-color:var(--ac)}
        .r2{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
        .r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem}

        button{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;border-radius:6px;padding:.5rem .85rem;font-size:.82rem;font-weight:600;cursor:pointer;width:100%}
        button:hover{opacity:.9}
        .btn-s{font-size:.75rem;padding:.35rem .55rem}
        .btn-2{background:var(--s2)}.btn-g{background:var(--gn)}.btn-o{background:var(--or);color:#000}.btn-r{background:var(--rd)}
        .btn-row{display:flex;gap:.4rem;margin-top:.4rem}

        /* Tabs */
        .tabs{display:flex;gap:2px;margin-bottom:1rem;flex-wrap:wrap}
        .tab{padding:.5rem 1rem;background:var(--s2);border:1px solid var(--bd);border-radius:8px 8px 0 0;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--mu);position:relative}
        .tab.active{background:var(--s1);color:var(--ac);border-bottom-color:var(--s1)}
        .tab .tab-close{margin-left:.5rem;color:var(--rd);font-size:.9rem;cursor:pointer}

        .tab-content{display:none}
        .tab-content.active{display:block}

        /* Layout per study */
        .study-grid{display:grid;grid-template-columns:350px 1fr;gap:1rem}
        @media(max-width:960px){.study-grid{grid-template-columns:1fr}}

        .seg-card{background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:.6rem;margin-bottom:.5rem}
        .seg-card .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
        .sc{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:.3rem}
        .sn{font-weight:600;font-size:.8rem}
        .rx{background:transparent;border:none;color:var(--rd);cursor:pointer;font-size:.95rem;width:auto;padding:0}
        .badge{font-size:.6rem;background:var(--s2);color:var(--mu);padding:.1rem .35rem;border-radius:3px;margin-left:.25rem}

        .auto-row{display:flex;gap:.4rem;align-items:flex-end;margin-bottom:.4rem}
        .auto-row>div{flex:1}.auto-row button{flex:0 0 auto;width:auto;margin-bottom:.5rem}

        .rg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem;margin-bottom:.75rem}
        .rc{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:.7rem}
        .rc .ct{font-size:.72rem;color:var(--mu);margin-bottom:.25rem}
        .rc .bn{font-size:1.3rem;font-weight:700}
        .rc .su{font-size:.72rem;color:var(--mu);margin-top:.15rem}

        .cw{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:.75rem;margin-bottom:.75rem}
        .cw h3{font-size:.8rem;color:var(--mu);margin-bottom:.5rem;border:none;padding:0}
        .cr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
        @media(max-width:960px){.cr{grid-template-columns:1fr}}

        .tw{overflow-x:auto;margin-top:.5rem}
        table{width:100%;border-collapse:collapse;font-size:.75rem}
        th{background:var(--s2);padding:.4rem .5rem;text-align:right;color:var(--mu);font-weight:600;white-space:nowrap}
        th:first-child{text-align:left}
        td{padding:.35rem .5rem;text-align:right;border-bottom:1px solid var(--s2)}
        td:first-child{text-align:left;font-weight:500}
        tr:hover td{background:rgba(59,130,246,.05)}
        .hl td{background:rgba(16,185,129,.1);font-weight:600}

        .cb{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.75rem}
        .ci{flex:1;min-width:170px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:.7rem;border-top:3px solid var(--ac)}
        .ci .cl{font-size:.7rem;color:var(--mu)}.ci .cv{font-size:1.1rem;font-weight:700;margin-top:.15rem}.ci .cs{font-size:.7rem;color:var(--mu)}

        .info{font-size:.72rem;color:var(--mu);line-height:1.35;margin-bottom:.4rem}
    </style>
</head>
<body>
<header>
    <div>
        <h1>WTP Price Optimizer</h1>
        <p>Willingness-To-Pay analysis with monotonic spline &mdash; multi-study & segmentation comparison</p>
    </div>
</header>
<div class="container">
    <div class="top-bar">
        <button class="btn-g btn-s" onclick="addStudy()">+ New Study / Product</button>
        <button onclick="calculateAll()">Calculate All & Compare</button>
    </div>
    <div class="tabs" id="tabs-bar"></div>
    <div id="studies-container"></div>
    <div id="global-comparison"></div>
</div>

<script>
// ===== PCHIP =====
function pchipSlopes(x,y){const n=x.length,d=new Array(n),h=[],dl=[];for(let i=0;i<n-1;i++){h.push(x[i+1]-x[i]);dl.push((y[i+1]-y[i])/h[i])}d[0]=pEnd(h[0],h[1],dl[0],dl[1]);d[n-1]=pEnd(h[n-2],h[n-3]||h[n-2],dl[n-2],dl[n-3]||dl[n-2]);for(let i=1;i<n-1;i++){if(dl[i-1]*dl[i]<=0)d[i]=0;else{const w1=2*h[i]+h[i-1],w2=h[i]+2*h[i-1];d[i]=(w1+w2)/(w1/dl[i-1]+w2/dl[i])}}return{h,dl,d}}
function pEnd(h1,h2,d1,d2){let s=((2*h1+h2)*d1-h1*d2)/(h1+h2);if(Math.sign(s)!==Math.sign(d1))s=0;else if(Math.sign(d1)!==Math.sign(d2)&&Math.abs(s)>Math.abs(3*d1))s=3*d1;return s}
function pchip(x,y,xq){const n=x.length;if(n<2)return xq.map(()=>y[0]||0);const{h,dl,d}=pchipSlopes(x,y);return xq.map(xv=>{let i=0;for(let j=0;j<n-1;j++)if(xv>=x[j])i=j;if(i>=n-1)i=n-2;const t=(xv-x[i])/h[i],t2=t*t,t3=t2*t;return(2*t3-3*t2+1)*y[i]+(t3-2*t2+t)*h[i]*d[i]+(-2*t3+3*t2)*y[i+1]+(t3-t2)*h[i]*d[i+1]})}

// ===== Helpers =====
const csv=s=>s.split(',').map(v=>parseFloat(v.trim())).filter(n=>!isNaN(n));
const fmt=(n,d=0)=>n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=n=>(n*100).toFixed(1)+'%';
const cur=n=>'$'+fmt(n,2);
const COL=['#3b82f6','#10b981','#f59e0b','#ec4899','#8b5cf6','#ef4444','#06b6d4','#84cc16','#a855f7','#14b8a6'];

// ===== Studies =====
let studies=[], activeTab=0, allCharts=[];
function destroyCharts(){allCharts.forEach(c=>c.destroy());allCharts=[]}

function addStudy(name){
    const id=studies.length;
    studies.push({id,name:name||`Study ${id+1}`});
    rebuildTabs();
    switchTab(id);
    renderStudyForm(id);
}

function removeStudy(id){
    studies=studies.filter(s=>s.id!==id);
    document.getElementById(`study-${id}`)?.remove();
    if(studies.length===0)addStudy();
    else{rebuildTabs();switchTab(studies[0].id)}
}

function rebuildTabs(){
    const bar=document.getElementById('tabs-bar');
    bar.innerHTML='';
    studies.forEach(s=>{
        const t=document.createElement('div');
        t.className='tab'+(s.id===activeTab?' active':'');
        t.innerHTML=`<span onclick="switchTab(${s.id})">${s.name}</span>${studies.length>1?`<span class="tab-close" onclick="event.stopPropagation();removeStudy(${s.id})">&times;</span>`:''}`;
        bar.appendChild(t);
    });
}

function switchTab(id){
    activeTab=id;
    document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
    const el=document.getElementById(`study-${id}`);
    if(el)el.classList.add('active');
    rebuildTabs();
}

function renderStudyForm(id){
    const container=document.getElementById('studies-container');
    let existing=document.getElementById(`study-${id}`);
    if(existing)existing.remove();

    const div=document.createElement('div');
    div.id=`study-${id}`;
    div.className='tab-content'+(id===activeTab?' active':'');
    div.innerHTML=`
    <div class="study-grid">
        <div>
            <div class="panel">
                <h2>Market Data</h2>
                <label>Study Name</label>
                <input class="st-name" value="${studies.find(s=>s.id===id).name}" onchange="studies.find(s=>s.id===${id}).name=this.value;rebuildTabs()">
                <label>Price Levels (comma-sep.)</label>
                <input class="st-prices" value="5,7,9,11,13,15,17,19,21" onchange="updateSplit(${id})">
                <label>All Market Answers</label>
                <input class="st-answers" value="6,3,10,0,1,2,5,0,1">
                <div class="r2">
                    <div><label>Demand (D)</label><input class="st-d" type="number" value="10000"></div>
                    <div><label>Resolution (m)</label><input class="st-m" type="number" value="100"></div>
                </div>
                <h3>Cost Parameters (All Market)</h3>
                <div class="r2">
                    <div><label>VCu</label><input class="st-vcu" type="number" step="0.01" value="2"></div>
                    <div><label>FC</label><input class="st-fc" type="number" step="0.01" value="3290"></div>
                </div>
                <div class="r2">
                    <div><label>FCu</label><input class="st-fcu" type="number" step="0.01" placeholder="Opt."></div>
                    <div><label>Q objective</label><input class="st-qobj" type="number" step="1" value="6500" placeholder="Opt."></div>
                </div>
            </div>
            <div class="panel">
                <h2>Auto Segmentation</h2>
                <p class="info">Split at a price level. Respondents at/below go to Seg 1, above to Seg 2. D is proportioned automatically.</p>
                <div class="auto-row">
                    <div><label>Split after price</label><select class="st-split"></select></div>
                    <button class="btn-g btn-s" onclick="autoSeg(${id})">Split</button>
                </div>
                <button class="btn-2 btn-s" onclick="clearAuto(${id})">Clear auto-segments</button>
            </div>
            <div class="panel">
                <h2>Manual Segments</h2>
                <p class="info">Custom segments with independent prices, answers & costs.</p>
                <div class="segs-box"></div>
                <button class="btn-2 btn-s" onclick="addManSeg(${id})">+ Add Manual Segment</button>
            </div>
        </div>
        <div class="study-results"><div class="panel" style="text-align:center;padding:2.5rem"><p style="color:var(--mu)">Click <b>Calculate All & Compare</b></p></div></div>
    </div>`;
    container.appendChild(div);
    updateSplit(id);
}

function getStudyEl(id){return document.getElementById(`study-${id}`)}
function qS(id,sel){return getStudyEl(id)?.querySelector(sel)}

function updateSplit(id){
    const el=getStudyEl(id);if(!el)return;
    const prices=csv(el.querySelector('.st-prices').value);
    const sel=el.querySelector('.st-split');
    sel.innerHTML='';
    for(let i=0;i<prices.length-1;i++){
        const o=document.createElement('option');o.value=i;
        o.textContent=`$${prices[i]} → Seg1: $${prices[0]}‒$${prices[i]} | Seg2: $${prices[i+1]}‒$${prices[prices.length-1]}`;
        sel.appendChild(o);
    }
    sel.selectedIndex=Math.floor((prices.length-1)/2);
}

// ===== Auto Seg =====
function autoSeg(id){
    clearAuto(id);
    const el=getStudyEl(id);
    const prices=csv(el.querySelector('.st-prices').value);
    const ans=csv(el.querySelector('.st-answers').value);
    const D=parseFloat(el.querySelector('.st-d').value);
    const si=parseInt(el.querySelector('.st-split').value);
    if(ans.length!==prices.length){alert('Answers must match prices length');return}

    const a1=ans.slice(0,si+1),a2=ans.slice(si+1);
    const t=ans.reduce((a,b)=>a+b,0);
    const D1=Math.round(D*a1.reduce((a,b)=>a+b,0)/t);
    const D2=Math.round(D*a2.reduce((a,b)=>a+b,0)/t);
    const p1=prices.slice(0,si+1),p2=prices.slice(si+1);

    const box=el.querySelector('.segs-box');
    box.prepend(mkSegCard(id,`Seg 2: $${p2[0]}‒$${p2[p2.length-1]}`,p2,a2,D2,true,1));
    box.prepend(mkSegCard(id,`Seg 1: $${p1[0]}‒$${p1[p1.length-1]}`,p1,a1,D1,true,0));
}
function clearAuto(id){getStudyEl(id)?.querySelectorAll('.auto-seg').forEach(e=>e.remove())}

function mkSegCard(id,name,prices,answers,D,isAuto,autoIdx){
    const el=getStudyEl(id);
    const vcu=el.querySelector('.st-vcu').value;
    const fc=el.querySelector('.st-fc').value;
    const fcu=el.querySelector('.st-fcu').value;
    const card=document.createElement('div');
    card.className='seg-card'+(isAuto?' auto-seg':'');
    const ci=isAuto?autoIdx+1:3+el.querySelectorAll('.seg-card').length;
    const col=COL[ci%COL.length];
    card.innerHTML=`
        <div class="sh">
            <span><span class="sc" style="background:${col}"></span><span class="sn" contenteditable="true">${name}</span>
            <span class="badge">${isAuto?'AUTO':'MANUAL'}</span></span>
            <button class="rx" onclick="this.closest('.seg-card').remove()">&times;</button>
        </div>
        <div class="r2">
            <div><label>Prices</label><input class="sg-p" value="${prices.join(',')}" ${isAuto?'readonly style="opacity:.7"':''}></div>
            <div><label>D</label><input class="sg-d" type="number" value="${D}"></div>
        </div>
        <label>Answers</label><input class="sg-a" value="${answers.join(',')}">
        <div class="r2">
            <div><label>VCu</label><input class="sg-vcu" type="number" step="0.01" value="${vcu}"></div>
            <div><label>FC</label><input class="sg-fc" type="number" step="0.01" value="${fc}"></div>
        </div>
        <div class="r2">
            <div><label>FCu</label><input class="sg-fcu" type="number" step="0.01" value="${fcu}" placeholder="Opt."></div>
            <div><label>Q obj.</label><input class="sg-qobj" type="number" step="1" placeholder="Opt."></div>
        </div>`;
    return card;
}

function addManSeg(id){
    const el=getStudyEl(id);
    const prices=el.querySelector('.st-prices').value;
    const D=el.querySelector('.st-d').value;
    const zeros=csv(prices).map(()=>0).join(',');
    el.querySelector('.segs-box').appendChild(mkSegCard(id,'Custom Segment',csv(prices),[],parseFloat(D),false));
    const last=el.querySelector('.segs-box .seg-card:last-child');
    last.querySelector('.sg-a').value=zeros;
}

// ===== Compute =====
function compute(segP,segA,D,m,vcu,fc,fcu,qobj){
    const t=segA.reduce((a,b)=>a+b,0);
    if(t===0)return null;
    const fr=segA.map(a=>a/t);
    const dem=segP.map((_,i)=>D*fr.slice(i).reduce((a,b)=>a+b,0));
    const xn=Math.min(...segP),xx=Math.max(...segP);
    const xs=Array.from({length:m},(_,i)=>xn+(xx-xn)*i/(m-1));
    const ys=pchip(segP,dem,xs).map(v=>Math.max(0,v));
    const tc=vcu+fcu;
    const pr=xs.map((p,i)=>p*ys[i]-tc*ys[i]-fc);
    const rv=xs.map((p,i)=>p*ys[i]);
    let mx=-Infinity,oi=0;pr.forEach((v,i)=>{if(v>mx){mx=v;oi=i}});
    const op=xs[oi],od=ys[oi],or=rv[oi],om=or>0?mx/or:0;
    const fu=qobj>0?fc/qobj:(od>0?fc/od:0);
    const td=segP.map((p,i)=>{const q=dem[i],r=p*q,v=tc*q,fa=fu*q,pf=r-v-fa;return{price:p,demand:q,revenue:r,vc:v,fcA:fa,profit:pf,margin:r>0?pf/r:0,freq:fr[i]}});
    return{D,fr,dem,segP,xs,ys,pr,rv,optPrice:op,optDemand:od,optRevenue:or,optProfit:mx,optMargin:om,vcu,fc,fcu,fcuCalc:fu,qobj,td};
}

function calculateAll(){
    destroyCharts();
    const globalResults=[];

    studies.forEach(st=>{
        const el=getStudyEl(st.id);if(!el)return;
        const prices=csv(el.querySelector('.st-prices').value);
        const ans=csv(el.querySelector('.st-answers').value);
        const D=parseFloat(el.querySelector('.st-d').value);
        const m=parseInt(el.querySelector('.st-m').value)||100;
        const vcu=parseFloat(el.querySelector('.st-vcu').value)||0;
        const fc=parseFloat(el.querySelector('.st-fc').value)||0;
        const fcu=parseFloat(el.querySelector('.st-fcu').value)||0;
        const qobj=parseFloat(el.querySelector('.st-qobj').value)||0;

        if(prices.length<2||ans.length!==prices.length){alert(`${st.name}: prices/answers mismatch`);return}

        const allM=compute(prices,ans,D,m,vcu,fc,fcu,qobj);
        if(!allM)return;
        allM.name=st.name+' — All Market';allM.color=COL[0];allM.studyName=st.name;

        const segs=[allM];
        el.querySelectorAll('.segs-box .seg-card').forEach((card,i)=>{
            const nm=card.querySelector('.sn').textContent.trim();
            const sp=csv(card.querySelector('.sg-p').value);
            const sa=csv(card.querySelector('.sg-a').value);
            const sd=parseFloat(card.querySelector('.sg-d').value)||D;
            const sv=parseFloat(card.querySelector('.sg-vcu').value)||0;
            const sf=parseFloat(card.querySelector('.sg-fc').value)||0;
            const su=parseFloat(card.querySelector('.sg-fcu').value)||0;
            const sq=parseFloat(card.querySelector('.sg-qobj').value)||0;
            if(sp.length<2||sa.length!==sp.length)return;
            const isA=card.classList.contains('auto-seg');
            const ci=isA?(1+parseInt(card.querySelector('.sc')?.style?.background?1:i)):3+i;
            const r=compute(sp,sa,sd,m,sv,sf,su,sq);
            if(r){r.name=st.name+' — '+nm;r.color=COL[(i+1)%COL.length];r.studyName=st.name;segs.push(r)}
        });

        renderStudyResults(st.id,segs);
        globalResults.push(...segs);
    });

    renderGlobalComparison(globalResults);
}

// ===== Render study results =====
function renderStudyResults(id,segs){
    const area=getStudyEl(id)?.querySelector('.study-results');
    if(!area)return;
    let h='';

    // Comparison bar within study
    if(segs.length>1){
        h+=`<div class="panel"><h2>Non-Segmented vs Segmented</h2><div class="cb">`;
        segs.forEach(r=>{
            h+=`<div class="ci" style="border-top-color:${r.color}">
                <div class="cl">${r.name.split(' — ')[1]||r.name}</div>
                <div class="cv" style="color:${r.color}">${cur(r.optPrice)}</div>
                <div class="cs">Optimal Price</div>
                <div style="margin-top:.3rem;font-size:.78rem">
                    <div>Profit: <b>${cur(r.optProfit)}</b></div>
                    <div>Demand: <b>${fmt(r.optDemand,0)}</b>/${fmt(r.D,0)}</div>
                    <div>Revenue: <b>${cur(r.optRevenue)}</b></div>
                    <div>Margin: <b>${pct(r.optMargin)}</b></div>
                </div></div>`;
        });
        h+=`</div></div>`;
    }

    // Per segment
    segs.forEach((r,si)=>{
        const label=r.name.split(' — ')[1]||r.name;
        h+=`<div class="panel" style="border-left:3px solid ${r.color}"><h2 style="color:${r.color}">${label}</h2>`;
        h+=`<div class="rg">
            <div class="rc"><div class="ct">Optimal Price</div><div class="bn" style="color:${r.color}">${cur(r.optPrice)}</div></div>
            <div class="rc"><div class="ct">Max Profit</div><div class="bn" style="color:var(--gn)">${cur(r.optProfit)}</div></div>
            <div class="rc"><div class="ct">Demand @ Opt.</div><div class="bn">${fmt(r.optDemand,0)}</div><div class="su">of ${fmt(r.D,0)}</div></div>
            <div class="rc"><div class="ct">Revenue @ Opt.</div><div class="bn">${cur(r.optRevenue)}</div><div class="su">Margin: ${pct(r.optMargin)}</div></div>
            <div class="rc"><div class="ct">VCu</div><div class="bn">${cur(r.vcu)}</div><div class="su">FCu calc.=${cur(r.fcuCalc)}</div></div>
            <div class="rc"><div class="ct">FC</div><div class="bn">${cur(r.fc)}</div></div>
        </div>`;
        h+=`<div class="cr">
            <div class="cw"><h3>Demand Curve</h3><canvas id="cd-${id}-${si}"></canvas></div>
            <div class="cw"><h3>Profit Function</h3><canvas id="cp-${id}-${si}"></canvas></div>
        </div>`;
        h+=`<div class="cw"><h3>Price Point Details</h3><div class="tw"><table>
            <tr><th>Price</th><th>Freq.</th><th>Demand</th><th>Revenue</th><th>VC</th><th>FC alloc.</th><th>Profit</th><th>Margin</th></tr>`;
        r.td.forEach(row=>{
            const hl=Math.abs(row.price-r.optPrice)<.5;
            h+=`<tr${hl?' class="hl"':''}>
                <td>${cur(row.price)}</td><td>${pct(row.freq)}</td><td>${fmt(row.demand,0)}</td>
                <td>${cur(row.revenue)}</td><td>${cur(row.vc)}</td><td>${cur(row.fcA)}</td>
                <td>${cur(row.profit)}</td><td>${pct(row.margin)}</td></tr>`;
        });
        h+=`</table></div></div></div>`;
    });

    // Overlay within study
    if(segs.length>1){
        h+=`<div class="panel"><h2>Overlay — ${segs[0].studyName}</h2><div class="cr">
            <div class="cw"><h3>Demand Curves</h3><canvas id="co-d-${id}"></canvas></div>
            <div class="cw"><h3>Profit Curves</h3><canvas id="co-p-${id}"></canvas></div>
        </div></div>`;
    }

    area.innerHTML=h;

    segs.forEach((r,si)=>{
        mkDemandChart(`cd-${id}-${si}`,r);
        mkProfitChart(`cp-${id}-${si}`,r);
    });
    if(segs.length>1){
        mkOverlay(`co-d-${id}`,segs,'demand');
        mkOverlay(`co-p-${id}`,segs,'profit');
    }
}

// ===== Global comparison =====
function renderGlobalComparison(all){
    const gc=document.getElementById('global-comparison');
    if(all.length<=1){gc.innerHTML='';return}

    let h=`<div class="panel"><h2>Cross-Study & Cross-Segment Comparison</h2><div class="cb">`;
    all.forEach(r=>{
        h+=`<div class="ci" style="border-top-color:${r.color}">
            <div class="cl">${r.name}</div>
            <div class="cv" style="color:${r.color}">${cur(r.optPrice)}</div>
            <div class="cs">Optimal Price</div>
            <div style="margin-top:.3rem;font-size:.78rem">
                <div>Profit: <b>${cur(r.optProfit)}</b></div>
                <div>Demand: <b>${fmt(r.optDemand,0)}</b></div>
                <div>Margin: <b>${pct(r.optMargin)}</b></div>
            </div></div>`;
    });
    h+=`</div><div class="cr">
        <div class="cw"><h3>All Demand Curves</h3><canvas id="gc-d"></canvas></div>
        <div class="cw"><h3>All Profit Curves</h3><canvas id="gc-p"></canvas></div>
    </div></div>`;
    gc.innerHTML=h;
    mkOverlay('gc-d',all,'demand');
    mkOverlay('gc-p',all,'profit');
}

// ===== Charts =====
const cdfl={responsive:true,plugins:{legend:{labels:{color:'#94a3b8',font:{size:10}}},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{color:'#64748b'},grid:{color:'rgba(71,85,105,.3)'}},y:{ticks:{color:'#64748b'},grid:{color:'rgba(71,85,105,.3)'}}}};

function mkDemandChart(id,r){
    const c=document.getElementById(id);if(!c)return;
    const lb=r.xs.map(v=>v.toFixed(1));
    const sd=lb.map((_,i)=>{const xv=r.xs[i];const pi=r.segP.findIndex(sp=>Math.abs(xv-sp)<(r.xs[1]-r.xs[0])*.6);return pi>=0?r.dem[pi]:null});
    allCharts.push(new Chart(c.getContext('2d'),{type:'line',data:{labels:lb,datasets:[
        {label:'Demand (spline)',data:r.ys,borderColor:r.color,backgroundColor:r.color+'20',fill:true,tension:.4,pointRadius:0,borderWidth:2},
        {label:'Data',data:sd,borderColor:'#fff',backgroundColor:r.color,pointRadius:4,showLine:false}
    ]},options:{...cdfl,scales:{x:{...cdfl.scales.x,title:{display:true,text:'Price',color:'#94a3b8'},ticks:{...cdfl.scales.x.ticks,maxTicksLimit:10}},y:{...cdfl.scales.y,title:{display:true,text:'Demand',color:'#94a3b8'}}}}}));
}

function mkProfitChart(id,r){
    const c=document.getElementById(id);if(!c)return;
    const lb=r.xs.map(v=>v.toFixed(1));
    const oi=r.pr.indexOf(Math.max(...r.pr));
    allCharts.push(new Chart(c.getContext('2d'),{type:'line',data:{labels:lb,datasets:[
        {label:'Profit',data:r.pr,borderColor:'#10b981',backgroundColor:'#10b98120',fill:true,tension:.4,pointRadius:r.pr.map((_,i)=>i===oi?5:0),pointBackgroundColor:'#10b981',borderWidth:2},
        {label:'Revenue',data:r.rv,borderColor:'#f59e0b',borderDash:[4,4],tension:.4,pointRadius:0,borderWidth:1.5,fill:false}
    ]},options:{...cdfl,scales:{x:{...cdfl.scales.x,title:{display:true,text:'Price',color:'#94a3b8'},ticks:{...cdfl.scales.x.ticks,maxTicksLimit:10}},y:{...cdfl.scales.y,title:{display:true,text:'$',color:'#94a3b8'}}}}}));
}

function mkOverlay(id,results,type){
    const c=document.getElementById(id);if(!c)return;
    const ds=results.map(r=>({label:r.name.split(' — ').pop(),data:r.xs.map((x,i)=>({x,y:type==='demand'?r.ys[i]:r.pr[i]})),borderColor:r.color,fill:false,tension:.4,pointRadius:0,borderWidth:2}));
    allCharts.push(new Chart(c.getContext('2d'),{type:'scatter',data:{datasets:ds},options:{...cdfl,showLine:true,scales:{x:{type:'linear',title:{display:true,text:'Price',color:'#94a3b8'},ticks:{color:'#64748b'},grid:{color:'rgba(71,85,105,.3)'}},y:{title:{display:true,text:type==='demand'?'Demand':'Profit ($)',color:'#94a3b8'},ticks:{color:'#64748b'},grid:{color:'rgba(71,85,105,.3)'}}},elements:{line:{tension:.4}}}}));
}

// ===== Init =====
addStudy('Wine Example');
</script>
